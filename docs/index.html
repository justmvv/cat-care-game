<!DOCTYPE html>
<html>
<head>
  <base href="/cat-care-game/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Кошкин день — комикс-игра, которая учит ухаживать за кошками. A Cat's Day — a comic game that teaches cat care.">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#E8A45C">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Кошкин день">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Кошкин день · A Cat's Day</title>
  <link rel="manifest" href="manifest.json">
</head>
<body style="background:#F5E9D3">
  <script>
    // --- PWA auto-update -------------------------------------------------
    // Flutter's service worker installs new versions in the background but
    // normally activates them only after ALL tabs are closed. This asks the
    // waiting worker to take over immediately and reloads the page once,
    // so every deploy reaches players on their next visit.
    if ('serviceWorker' in navigator) {
      let reloaded = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!reloaded) { reloaded = true; window.location.reload(); }
      });
      window.addEventListener('load', () => {
        navigator.serviceWorker.ready.then((reg) => {
          const activate = (sw) => sw && sw.postMessage('skipWaiting');
          activate(reg.waiting);
          reg.addEventListener('updatefound', () => {
            const nw = reg.installing;
            if (!nw) return;
            nw.addEventListener('statechange', () => {
              if (nw.state === 'installed' &&
                  navigator.serviceWorker.controller) {
                activate(nw);
              }
            });
          });
          // check for a new version periodically while the tab is open
          reg.update();
          setInterval(() => reg.update(), 30 * 60 * 1000);
        });
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
